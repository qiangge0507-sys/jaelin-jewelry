name: Extract Uploaded Site Package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'jaelin-jewelry-demo.zip'
      - '.github/workflows/extract-site.yml'

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Extract site package
        run: |
          if [ ! -f jaelin-jewelry-demo.zip ]; then
            echo "jaelin-jewelry-demo.zip not found"
            exit 1
          fi
          rm -rf /tmp/jaelin-site
          mkdir -p /tmp/jaelin-site
          unzip -q jaelin-jewelry-demo.zip -d /tmp/jaelin-site
          if [ -d /tmp/jaelin-site/jaelin-jewelry-demo ]; then
            cp -R /tmp/jaelin-site/jaelin-jewelry-demo/. .
          else
            cp -R /tmp/jaelin-site/. .
          fi
          rm -f design-qa.md
          git status --short

      - name: Commit extracted site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html collection.html new-arrivals.html gift-guide.html about.html contact.html site-pages.css site-pages.js product-data.js assets
          git commit -m "Extract Jaelin Jewelry static site" || exit 0
          git push
